services:
  web:
    build: .
    container_name: web
    volumes:
      - static_volume:/app/backend/staticfiles
      - media_volume:/app/backend/media
    expose:
      - "8000"
    env_file:
      - .env

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=one9founders
      - N8N_BASIC_AUTH_PASSWORD=M@rch15Deadline
      - N8N_HOST=n8n.one9founders.com
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.one9founders.com
      - N8N_PROTOCOL=http
      - TZ=Asia/Kolkata

    volumes:
      - n8n_data:/home/node/.n8n

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/backend/staticfiles
      - media_volume:/app/backend/media
    depends_on:
      - web
      - n8n

volumes:
  static_volume:
  media_volume:
  n8n_data:
