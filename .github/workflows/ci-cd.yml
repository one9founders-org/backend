name: Django CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint + Format
  # ─────────────────────────────────────────────
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-lint-${{ hashFiles('requirements.txt') }}

      - name: Install lint tools
        run: pip install black isort flake8 bandit

      - name: Black
        run: black --check --diff api/ config/ tests/

      - name: isort
        run: isort --check-only --diff api/ config/ tests/

      - name: flake8
        run: flake8 api/ config/ tests/

      - name: bandit (security scan)
        run: bandit -r api/ -f json -o bandit-report.json || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ─────────────────────────────────────────────
  # 2. Test
  # ─────────────────────────────────────────────
  test:
    needs: lint-and-format
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: one9testuser
          POSTGRES_PASSWORD: one9testpass
          POSTGRES_DB: test_one9founders
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-test-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set env vars
        run: |
          echo "SECRET_KEY=test-secret-key-for-ci"           >> $GITHUB_ENV
          echo "DEBUG=True"                                   >> $GITHUB_ENV
          echo "DATABASE_NAME=test_one9founders"              >> $GITHUB_ENV
          echo "DATABASE_USER=one9testuser"                   >> $GITHUB_ENV
          echo "DATABASE_PASSWORD=one9testpass"               >> $GITHUB_ENV
          echo "DATABASE_HOST=localhost"                      >> $GITHUB_ENV
          echo "DATABASE_PORT=5432"                           >> $GITHUB_ENV
          echo "OPENAI_API_KEY=test-key"                      >> $GITHUB_ENV
          echo "DJANGO_SETTINGS_MODULE=config.settings"       >> $GITHUB_ENV

      # FIX: run makemigrations --check so missing migrations are caught in CI
      # Scope to project apps only (excludes third-party like django_summernote)
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run api rag_directory research_papers

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests with coverage
        run: pytest --cov=api --cov-report=xml --cov-report=html

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests

  # ─────────────────────────────────────────────
  # 3. Deploy  (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    needs: [lint-and-format, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -e
            cd /var/www/one9founders
            git pull origin main

            # Record git SHA for Sentry release tracking
            sed -i '/^GIT_SHA=/d' .env
            echo "GIT_SHA=$(git rev-parse --short HEAD)" >> .env

            # Rebuild and restart containers
            docker compose down
            DOCKER_BUILDKIT=1 docker compose build --build-arg BUILDKIT_INLINE_CACHE=1
            docker compose up -d

            # Run migrations
            docker compose exec -T web python manage.py migrate --noinput

            # Collect static files
            docker compose exec -T web python manage.py collectstatic --noinput

            # FIX: Rebuild FAISS index and upload to S3 so search works after deploy
            # This downloads the S3 index on the next cold start automatically.
            # Only rebuilds if tools have changed — the command is idempotent.
            docker compose exec -T web python manage.py build_faiss_index

            echo "Deploy complete."
